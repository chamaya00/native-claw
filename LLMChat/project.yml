name: LLMChat
options:
  deploymentTarget:
    iOS: "27.0"
  xcodeVersion: "27.0"
  swift: "6.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "27.0"
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Private Cloud Compute binding. The WWDC26 `LanguageModel` protocol and
    # `PrivateCloudComputeLanguageModel` ship in the iOS 27 SDK (Xcode 27). This project now
    # targets iOS 27, so the flag below is ON and PCC binds for real
    # (ModelRouter.bind, ConversationEngine.model(for:), EvalRunner). Building against an
    # iOS 26 SDK (Xcode 26) will fail to compile the PCC code path — use Xcode 27+.
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) FM_PCC"

# ---------------------------------------------------------------------------
# Modular architecture (IMPLEMENTATION_PLAN §D).
#
# Domains are split into framework targets so the agent loop, memory, and tools
# are isolated from view code and independently buildable. We use XcodeGen
# framework targets (rather than separate Package.swift manifests) so the whole
# project is driven by this single spec the CI already builds, and every module
# inherits one deployment target — avoiding per-package platform wiring that
# can't be verified without a Mac. Module boundaries are still enforced by the
# build system: each Kit is its own `import`-able module.
#
#   MemoryKit   → SwiftData models, drafts, ToolEvent, retrieval, routing policy (no deps)
#   ToolsKit    → Tool implementations            (→ MemoryKit)
#   AgentKit    → engine, budget, persona, gate, model router, profiles (→ MemoryKit, ToolsKit)
#   SkillsKit   → declarative skills, runner, App Intents/Shortcuts (→ MemoryKit, AgentKit)
#   VoiceKit    → SpeechAnalyzer STT pipeline + AVSpeechSynthesizer TTS (no deps)
#   EvalHarness → assistant eval suite + runner   (→ AgentKit, MemoryKit)
#   LLMChat     → app target / product "Claw"     (→ AgentKit, ToolsKit, MemoryKit, SkillsKit, VoiceKit, EvalHarness)
# ---------------------------------------------------------------------------

targets:
  MemoryKit:
    type: framework
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: Packages/MemoryKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.MemoryKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  ToolsKit:
    type: framework
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: Packages/ToolsKit/Sources
    dependencies:
      - target: MemoryKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.ToolsKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  AgentKit:
    type: framework
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: Packages/AgentKit/Sources
    dependencies:
      - target: MemoryKit
      - target: ToolsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.AgentKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  SkillsKit:
    type: framework
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: Packages/SkillsKit/Sources
    dependencies:
      - target: MemoryKit
      - target: AgentKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.SkillsKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  VoiceKit:
    type: framework
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: Packages/VoiceKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.VoiceKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  EvalHarness:
    type: framework
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: Packages/EvalHarness/Sources
    dependencies:
      - target: AgentKit
      - target: MemoryKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.EvalHarness
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  LLMChat:
    type: application
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: App
      - path: Resources/Assets.xcassets
    dependencies:
      - target: AgentKit
      - target: ToolsKit
      - target: MemoryKit
      - target: SkillsKit
      - target: VoiceKit
      - target: EvalHarness
    settings:
      base:
        PRODUCT_NAME: Claw
        PRODUCT_BUNDLE_IDENTIFIER: ${APP_IDENTIFIER}
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: LLMChat.entitlements
