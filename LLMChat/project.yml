name: LLMChat
options:
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  swift: "6.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

# ---------------------------------------------------------------------------
# Modular architecture (IMPLEMENTATION_PLAN §D).
#
# Domains are split into framework targets so the agent loop, memory, and tools
# are isolated from view code and independently buildable. We use XcodeGen
# framework targets (rather than separate Package.swift manifests) so the whole
# project is driven by this single spec the CI already builds, and every module
# inherits one deployment target — avoiding per-package platform wiring that
# can't be verified without a Mac. Module boundaries are still enforced by the
# build system: each Kit is its own `import`-able module.
#
#   MemoryKit  → SwiftData models, drafts, ToolEvent, retrieval (no deps)
#   ToolsKit   → Tool implementations           (→ MemoryKit)
#   AgentKit   → engine, budget, persona, gate  (→ MemoryKit, ToolsKit)
#   LLMChat    → app target / product "Claw"    (→ AgentKit, ToolsKit, MemoryKit)
# ---------------------------------------------------------------------------

targets:
  MemoryKit:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Packages/MemoryKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.MemoryKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        # Frameworks must NOT carry a provisioning profile — Xcode rejects the
        # archive with "<Target> does not support provisioning profiles". They
        # are manually signed with the distribution identity (no profile) and
        # then re-signed with the app's identity during the embed phase. This
        # also avoids Automatic signing, which can't run in a match-based CI
        # where no Apple ID is logged into Xcode.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: ""

  ToolsKit:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Packages/ToolsKit/Sources
    dependencies:
      - target: MemoryKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.ToolsKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        # See MemoryKit: frameworks are manually signed without a profile.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: ""

  AgentKit:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Packages/AgentKit/Sources
    dependencies:
      - target: MemoryKit
      - target: ToolsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.AgentKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        # See MemoryKit: frameworks are manually signed without a profile.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: ""

  LLMChat:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
      - path: Resources/Assets.xcassets
    dependencies:
      - target: AgentKit
      - target: ToolsKit
      - target: MemoryKit
    settings:
      base:
        PRODUCT_NAME: Claw
        PRODUCT_BUNDLE_IDENTIFIER: ${APP_IDENTIFIER}
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: LLMChat.entitlements
