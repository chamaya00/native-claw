name: LLMChat
options:
  xcodeVersion: "26.0"
  swift: "6.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Private Cloud Compute is a build-time opt-in, driven by two env vars so that
    # CI on Xcode 26 stays green while an Xcode 27 build can bind PCC for real:
    #   • default (vars unset) → iOS 26, FM_PCC off — PCC degrades to on-device.
    #   • FM_PCC build (X27)   → iOS 27, FM_PCC on  — real PrivateCloudComputeLanguageModel
    #     (ModelRouter.bind, ConversationEngine.model(for:), EvalRunner).
    # `PrivateCloudComputeLanguageModel` and the WWDC26 `LanguageModel` protocol only exist
    # in the iOS 27 SDK, so the FM_PCC path *cannot* compile under Xcode 26 — the toggle is
    # what keeps the default build (and CI) compilable there.
    #
    # Generate with `bundle exec fastlane generate_project` (safe iOS 26 default) or
    # `FM_PCC=1 bundle exec fastlane generate_project` (iOS 27 + PCC). The Fastfile fills in
    # LLMCHAT_DEPLOYMENT_TARGET / LLMCHAT_SWIFT_FLAGS below; set them directly for a bare
    # `xcodegen generate`.
    IPHONEOS_DEPLOYMENT_TARGET: "${LLMCHAT_DEPLOYMENT_TARGET}"
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) ${LLMCHAT_SWIFT_FLAGS}"
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

# ---------------------------------------------------------------------------
# Modular architecture (IMPLEMENTATION_PLAN §D).
#
# Domains are split into framework targets so the agent loop, memory, and tools
# are isolated from view code and independently buildable. We use XcodeGen
# framework targets (rather than separate Package.swift manifests) so the whole
# project is driven by this single spec the CI already builds, and every module
# inherits one deployment target — avoiding per-package platform wiring that
# can't be verified without a Mac. Module boundaries are still enforced by the
# build system: each Kit is its own `import`-able module.
#
#   MemoryKit   → SwiftData models, drafts, ToolEvent, retrieval, routing policy (no deps)
#   ToolsKit    → Tool implementations            (→ MemoryKit)
#   AgentKit    → engine, budget, persona, gate, model router, profiles (→ MemoryKit, ToolsKit)
#   SkillsKit   → declarative skills, runner, App Intents/Shortcuts (→ MemoryKit, AgentKit)
#   VoiceKit    → SpeechAnalyzer STT pipeline + AVSpeechSynthesizer TTS (no deps)
#   EvalHarness → assistant eval suite + runner   (→ AgentKit, MemoryKit)
#   LLMChat     → app target / product "Claw"     (→ AgentKit, ToolsKit, MemoryKit, SkillsKit, VoiceKit, EvalHarness)
# ---------------------------------------------------------------------------

targets:
  MemoryKit:
    type: framework
    platform: iOS
    sources:
      - path: Packages/MemoryKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.MemoryKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  ToolsKit:
    type: framework
    platform: iOS
    sources:
      - path: Packages/ToolsKit/Sources
    dependencies:
      - target: MemoryKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.ToolsKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  AgentKit:
    type: framework
    platform: iOS
    sources:
      - path: Packages/AgentKit/Sources
    dependencies:
      - target: MemoryKit
      - target: ToolsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.AgentKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  SkillsKit:
    type: framework
    platform: iOS
    sources:
      - path: Packages/SkillsKit/Sources
    dependencies:
      - target: MemoryKit
      - target: AgentKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.SkillsKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  VoiceKit:
    type: framework
    platform: iOS
    sources:
      - path: Packages/VoiceKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.VoiceKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  EvalHarness:
    type: framework
    platform: iOS
    sources:
      - path: Packages/EvalHarness/Sources
    dependencies:
      - target: AgentKit
      - target: MemoryKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlesamaya.llmchat.EvalHarness
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  LLMChat:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Resources/Assets.xcassets
    dependencies:
      - target: AgentKit
      - target: ToolsKit
      - target: MemoryKit
      - target: SkillsKit
      - target: VoiceKit
      - target: EvalHarness
    settings:
      base:
        PRODUCT_NAME: Claw
        PRODUCT_BUNDLE_IDENTIFIER: ${APP_IDENTIFIER}
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: LLMChat.entitlements
