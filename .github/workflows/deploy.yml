name: Deploy to TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for this build"
        required: false
        default: "Bug fixes and improvements"
  push:
    tags:
      - "v*.*.*"

# `statuses: write` lets the final step publish a `testflight/deploy` commit
# status on the head SHA. When this workflow is dispatched against a phase PR
# branch, that status appears on the PR and wakes the orchestrating Claude
# session via PR activity — no human copy-paste of the result is needed.
permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    name: Deploy to TestFlight
    runs-on: macos-15

    environment: testflight

    env:
      APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_STORE_TEAM_ID: ${{ secrets.APP_STORE_TEAM_ID }}
      DEVELOPMENT_TEAM: ${{ secrets.APP_STORE_TEAM_ID }}
      ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'Bug fixes and improvements' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          # Dynamically pick the latest Xcode 26.x installed on the runner.
          XCODE26=$(ls /Applications/ \
            | grep -E '^Xcode_26(\.[0-9]+)*\.app$' \
            | sort -t. -k1,1 -k2,2n -k3,3n -k4,4n \
            | tail -1)

          if [ -z "$XCODE26" ]; then
            echo "::error::No Xcode 26.x installation found in /Applications/"
            echo "Available Xcode installations:"
            ls /Applications/ | grep -i xcode
            exit 1
          fi

          echo "Using $XCODE26"
          sudo xcode-select -s "/Applications/$XCODE26/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: LLMChat

      - name: Install Fastlane
        working-directory: LLMChat
        run: bundle install

      - name: Set up SSH for Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Run Fastlane beta lane
        working-directory: LLMChat
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LLMChat-${{ github.ref_name }}.ipa
          path: LLMChat/build/*.ipa
          retention-days: 30

      # Publish the outcome as a commit status on the dispatched ref's head
      # SHA. `if: always()` ensures both success and failure are reported, so
      # the orchestrating session is woken either way and never waits forever.
      - name: Report deploy result as commit status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATE="success"
            DESCRIPTION="TestFlight deploy succeeded"
          elif [ -f LLMChat/.agreement_blocked ]; then
            # Account-level block (expired/unsigned App Store agreement), not a
            # code failure. Name it explicitly so a human — or the orchestrating
            # session woken by this status — knows to accept the agreement rather
            # than chase a nonexistent build bug.
            STATE="failure"
            DESCRIPTION="Blocked: accept the App Store agreement in App Store Connect (account-level, not a code issue)"
          else
            STATE="failure"
            DESCRIPTION="TestFlight deploy failed — see run logs"
          fi
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$STATE" \
            -f context="testflight/deploy" \
            -f description="$DESCRIPTION" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
